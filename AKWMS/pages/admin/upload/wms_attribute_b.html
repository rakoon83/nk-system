<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS 속성 업로드</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  html,
  body{
    height:100%;
    margin:0;
  }

  body{
    overflow:auto;
  }

  #page-content,
  .wms-page-content{
    height:100%;
    min-height:0;
    display:flex;
    flex-direction:column;
  }

  .wms-attribute-b-page{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
    background:#fff;
    overflow:hidden;
  }

  #page-topbar,
  #wms-attribute-b-toolbar,
  #page-status{
    flex:0 0 auto;
  }

  .table-shell{
    overflow:auto !important;
  }

  #print-area.table-shell{
    flex:1 1 auto;
    min-height:0;
    min-width:0;
    height:0;
    overflow:auto !important;
  }

  #wms-attribute-b-table{
    min-width:1200px;
    width:100%;
  }

  .wms-attribute-b-table col:nth-child(1){ width:44px; }
  .wms-attribute-b-table col:nth-child(2){ width:80px; }
  .wms-attribute-b-table col:nth-child(3){ width:180px; }
  .wms-attribute-b-table col:nth-child(4){ width:140px; }
  .wms-attribute-b-table col:nth-child(5){ width:140px; }
  .wms-attribute-b-table col:nth-child(6){ width:320px; }
  .wms-attribute-b-table col:nth-child(7){ width:100px; }
  .wms-attribute-b-table col:nth-child(8){ width:140px; }
  .wms-attribute-b-table col:nth-child(9){ width:140px; }
  .wms-attribute-b-table col:nth-child(10){ width:180px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="wms-attribute-b-page">
      <div id="page-topbar"></div>
      <div id="wms-attribute-b-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table wms-attribute-b-table" id="wms-attribute-b-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="invoice">
            <col data-col-key="material_no">
            <col data-col-key="box_no">
            <col data-col-key="material_name">
            <col data-col-key="inbound_qty">
            <col data-col-key="mfg_date">
            <col data-col-key="exp_date">
            <col data-col-key="created_at">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="invoice">
                <div class="th-inner">
                  <span class="th-label">Invoice</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_no">
                <div class="th-inner">
                  <span class="th-label">코드</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="box_no">
                <div class="th-inner">
                  <span class="th-label">박스번호</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_name">
                <div class="th-inner">
                  <span class="th-label">자재내역</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="inbound_qty">
                <div class="th-inner">
                  <span class="th-label">수량</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="mfg_date">
                <div class="th-inner">
                  <span class="th-label">제조일자</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="exp_date">
                <div class="th-inner">
                  <span class="th-label">유통기한</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="created_at">
                <div class="th-inner">
                  <span class="th-label">등록일시</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="wms-attribute-b-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/admin/upload/wms_attribute_b.js?v=20260422_01"></script>
</body>
</html>
