<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결품 업로드</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: auto;
    }

    #page-content,
    .wms-page-content {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .defect-upload-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    #page-topbar,
    #defect-upload-toolbar,
    #page-status {
      flex: 0 0 auto;
    }

    .table-shell {
      overflow: auto !important;
    }

    #print-area.table-shell {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      height: 0;
      overflow: auto !important;
    }

    #defect-upload-table {
      min-width: 1450px;
      width: 100%;
    }

    .defect-upload-table col:nth-child(1)  { width: 44px; }
    .defect-upload-table col:nth-child(2)  { width: 80px; }
    .defect-upload-table col:nth-child(3)  { width: 140px; }
    .defect-upload-table col:nth-child(4)  { width: 120px; }
    .defect-upload-table col:nth-child(5)  { width: 100px; }
    .defect-upload-table col:nth-child(6)  { width: 180px; }
    .defect-upload-table col:nth-child(7)  { width: 120px; }
    .defect-upload-table col:nth-child(8)  { width: 180px; }
    .defect-upload-table col:nth-child(9)  { width: 120px; }
    .defect-upload-table col:nth-child(10) { width: 180px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="defect-upload-page">
      <div id="page-topbar"></div>
      <div id="defect-upload-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table defect-upload-table" id="defect-upload-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="invoice">
            <col data-col-key="ship_date">
            <col data-col-key="country">
            <col data-col-key="type">
            <col data-col-key="defect">
            <col data-col-key="location">
            <col data-col-key="location_detail">
            <col data-col-key="load_time">
            <col data-col-key="created_at">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="invoice">
                <div class="th-inner">
                  <span class="th-label">Invoice</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="ship_date">
                <div class="th-inner">
                  <span class="th-label">출고일</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country">
                <div class="th-inner">
                  <span class="th-label">국가</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="type">
                <div class="th-inner">
                  <span class="th-label">유형</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="defect">
                <div class="th-inner">
                  <span class="th-label">결품</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="location">
                <div class="th-inner">
                  <span class="th-label">위치</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="location_detail">
                <div class="th-inner">
                  <span class="th-label">상세위치</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="load_time">
                <div class="th-inner">
                  <span class="th-label">상차시간</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="created_at">
                <div class="th-inner">
                  <span class="th-label">등록일시</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="defect-upload-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/admin/upload/defect_upload.js?v=20260423_01"></script>
</body>
</html>
