<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바코드 마스터</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: auto;
    }

    #page-content,
    .wms-page-content {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .barcode-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    #page-topbar,
    #barcode-toolbar,
    #page-status {
      flex: 0 0 auto;
    }

    .table-shell {
      overflow: auto !important;
    }

    #print-area.table-shell {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      height: 0;
      overflow: auto !important;
    }

    #barcode-table {
      min-width: 1250px;
      width: 100%;
    }

    .barcode-table col:nth-child(1) { width: 44px; }
    .barcode-table col:nth-child(2) { width: 80px; }
    .barcode-table col:nth-child(3) { width: 170px; }
    .barcode-table col:nth-child(4) { width: 150px; }
    .barcode-table col:nth-child(5) { width: 320px; }
    .barcode-table col:nth-child(6) { width: 110px; }
    .barcode-table col:nth-child(7) { width: 140px; }
    .barcode-table col:nth-child(8) { width: 220px; }
    .barcode-table col:nth-child(9) { width: 180px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="barcode-page">
      <div id="page-topbar"></div>
      <div id="barcode-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table barcode-table" id="barcode-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="material_no">
            <col data-col-key="box_no">
            <col data-col-key="material_name">
            <col data-col-key="pack_qty">
            <col data-col-key="exp_date">
            <col data-col-key="barcode">
            <col data-col-key="created_at">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_no">
                <div class="th-inner">
                  <span class="th-label">자재번호</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="box_no">
                <div class="th-inner">
                  <span class="th-label">박스번호</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_name">
                <div class="th-inner">
                  <span class="th-label">자재내역</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="pack_qty">
                <div class="th-inner">
                  <span class="th-label">입수</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="exp_date">
                <div class="th-inner">
                  <span class="th-label">유통기한</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="barcode">
                <div class="th-inner">
                  <span class="th-label">바코드</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="created_at">
                <div class="th-inner">
                  <span class="th-label">등록일시</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="barcode-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/admin/master/barcode.js?v=20260423"></script>
</body>
</html>
