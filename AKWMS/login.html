<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WMS 로그인</title>

<link rel="stylesheet" href="/assets/css/font.css">
<link rel="stylesheet" href="/assets/css/common.css">

<style>

.login-page{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:360px;
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.login-title{
  font-size:26px;
  font-weight:800;
  color:#1d4ed8;
  margin-bottom:6px;
}

.login-sub{
  font-size:13px;
  color:#6b7280;
  margin-bottom:22px;
}

.form-row{
  margin-bottom:14px;
}

.form-label{
  display:block;
  font-size:13px;
  margin-bottom:6px;
  color:#374151;
  font-weight:700;
}

.form-input{
  width:100%;
  height:42px;
  border:1px solid #d1d5db;
  border-radius:8px;
  padding:0 10px;
  font-size:14px;
}

.login-btn{
  width:100%;
  margin-top:10px;
}

.error-msg{
  margin-top:10px;
  font-size:13px;
  color:#dc2626;
  display:none;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#9ca3af;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="login-page">

  <div class="login-box">

    <div class="login-title">WMS SYSTEM</div>
    <div class="login-sub">Warehouse Management System</div>

    <div class="form-row">
      <label class="form-label">아이디</label>
      <input id="login-id" class="form-input" type="text" placeholder="아이디">
    </div>

    <div class="form-row">
      <label class="form-label">비밀번호</label>
      <input id="login-pw" class="form-input" type="password" placeholder="비밀번호">
    </div>

    <button id="login-btn" class="btn login-btn">로그인</button>

    <div id="login-error" class="error-msg"></div>

    <div class="footer">
      WMS Warehouse System
    </div>

  </div>

</div>

<script type="module">

import { login, isLoggedIn } from "/assets/js/core/auth.js"

if(isLoggedIn()){
  location.href="/main.html"
}

const idInput=document.getElementById("login-id")
const pwInput=document.getElementById("login-pw")
const btn=document.getElementById("login-btn")
const error=document.getElementById("login-error")

btn.onclick=doLogin

pwInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") doLogin()
})

async function doLogin(){

  const id=idInput.value.trim()
  const pw=pwInput.value.trim()

  if(!id || !pw){
    error.textContent="아이디와 비밀번호를 입력하세요"
    error.style.display="block"
    return
  }

  const ok = await login(id,pw)

  if(ok){
    location.href="/main.html"
  }else{
    error.textContent="아이디 또는 비밀번호가 올바르지 않습니다"
    error.style.display="block"
  }

}

</script>

</body>
</html>
