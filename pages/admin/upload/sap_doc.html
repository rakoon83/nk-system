<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP 문서 업로드</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  html,
  body{
    height:100%;
    margin:0;
  }

  body{
  overflow:auto;
}

  #page-content,
.wms-page-content{
  height:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
}

  .sap-doc-page{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
    background:#fff;
    overflow:hidden;
  }

  #page-topbar,
  #sap-doc-toolbar,
  #page-status{
    flex:0 0 auto;
  }

  .table-shell{
    overflow:auto !important;
  }

  #print-area.table-shell{
  flex:1 1 auto;
  min-height:0;
  min-width:0;
  height:0;
  overflow:auto !important;
}

  #sap-doc-table{
  min-width:2100px;
  width:100%;
}

  .sap-doc-table col:nth-child(1){ width:44px; }
  .sap-doc-table col:nth-child(2){ width:80px; }
  .sap-doc-table col:nth-child(3){ width:140px; }
  .sap-doc-table col:nth-child(4){ width:110px; }
  .sap-doc-table col:nth-child(5){ width:120px; }
  .sap-doc-table col:nth-child(6){ width:110px; }
  .sap-doc-table col:nth-child(7){ width:100px; }
  .sap-doc-table col:nth-child(8){ width:90px; }
  .sap-doc-table col:nth-child(9){ width:90px; }
  .sap-doc-table col:nth-child(10){ width:90px; }
  .sap-doc-table col:nth-child(11){ width:140px; }
  .sap-doc-table col:nth-child(12){ width:140px; }
  .sap-doc-table col:nth-child(13){ width:220px; }
  .sap-doc-table col:nth-child(14){ width:120px; }
  .sap-doc-table col:nth-child(15){ width:180px; }
</style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="sap-doc-page">
      <div id="page-topbar"></div>
      <div id="sap-doc-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table sap-doc-table" id="sap-doc-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="invoice">
            <col data-col-key="ship_date">
            <col data-col-key="country">
            <col data-col-key="country_key">
            <col data-col-key="outbound_qty">
            <col data-col-key="product_qty">
            <col data-col-key="outer_box_qty">
            <col data-col-key="total_qty">
            <col data-col-key="type">
            <col data-col-key="container">
            <col data-col-key="customer_name">
            <col data-col-key="manager">
            <col data-col-key="created_at">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="invoice">
                <div class="th-inner">
                  <span class="th-label">인보이스</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="ship_date">
                <div class="th-inner">
                  <span class="th-label">출고일</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country">
                <div class="th-inner">
                  <span class="th-label">국가</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country_key">
                <div class="th-inner">
                  <span class="th-label">Country Key</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="outbound_qty">
                <div class="th-inner">
                  <span class="th-label">출고</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="product_qty">
                <div class="th-inner">
                  <span class="th-label">제품</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="outer_box_qty">
                <div class="th-inner">
                  <span class="th-label">외박스</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="total_qty">
                <div class="th-inner">
                  <span class="th-label">합계</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="type">
                <div class="th-inner">
                  <span class="th-label">유형</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="container">
                <div class="th-inner">
                  <span class="th-label">컨테이너</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="customer_name">
                <div class="th-inner">
                  <span class="th-label">납품처명</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="manager">
                <div class="th-inner">
                  <span class="th-label">담당자</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="created_at">
                <div class="th-inner">
                  <span class="th-label">등록일시</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="sap-doc-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/admin/upload/sap_doc.js?v=20260426"></script>
</body>
</html>
