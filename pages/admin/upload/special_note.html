<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>특이사항 업로드</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: auto;
    }

    #page-content,
    .wms-page-content {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .special-note-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    #page-topbar,
    #special-note-toolbar,
    #page-status {
      flex: 0 0 auto;
    }

    .table-shell {
      overflow: auto !important;
    }

    #print-area.table-shell {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      height: 0;
      overflow: auto !important;
    }

    #special-note-table {
      min-width: 1300px;
      width: 100%;
    }

    .special-note-table col:nth-child(1) { width: 44px; }
    .special-note-table col:nth-child(2) { width: 80px; }
    .special-note-table col:nth-child(3) { width: 170px; }
    .special-note-table col:nth-child(4) { width: 130px; }
    .special-note-table col:nth-child(5) { width: 100px; }
    .special-note-table col:nth-child(6) { width: 220px; }
    .special-note-table col:nth-child(7) { width: 320px; }
    .special-note-table col:nth-child(8) { width: 180px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="special-note-page">
      <div id="page-topbar"></div>
      <div id="special-note-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table special-note-table" id="special-note-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="invoice">
            <col data-col-key="ship_date">
            <col data-col-key="country">
            <col data-col-key="base_issue">
            <col data-col-key="issue">
            <col data-col-key="created_at">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="invoice">
                <div class="th-inner">
                  <span class="th-label">Invoice</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="ship_date">
                <div class="th-inner">
                  <span class="th-label">출고일</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country">
                <div class="th-inner">
                  <span class="th-label">국가</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="base_issue">
                <div class="th-inner">
                  <span class="th-label">기본특이사항</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="issue">
                <div class="th-inner">
                  <span class="th-label">상세특이사항</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="created_at">
                <div class="th-inner">
                  <span class="th-label">등록일시</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="special-note-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/admin/upload/special_note.js?v=20260422_01"></script>
</body>
</html>
