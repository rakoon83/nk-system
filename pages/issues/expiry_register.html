<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유통기한 등록</title>

  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=1">

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body{
  height:100%;
  margin:0;
}

body{
  overflow:auto;
}

/* 페이지 구조 */
#page-content,
.wms-page-content{
  height:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
}

.expiry-register-page{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:#fff;
  overflow:hidden;
}

#page-topbar,
#expiry-register-toolbar,
#page-status{
  flex:0 0 auto;
}

/* 테이블 영역 */
.table-shell{
  overflow:auto !important;
}

#print-area.table-shell{
  flex:1 1 auto;
  min-height:0;
  min-width:0;
  height:0;
  overflow:auto !important;
}

#expiry-register-table{
  min-width:1450px;
  width:100%;
}

.expiry-register-table col:nth-child(1){width:44px;}
.expiry-register-table col:nth-child(2){width:80px;}
.expiry-register-table col:nth-child(3){width:100px;}
.expiry-register-table col:nth-child(4){width:170px;}
.expiry-register-table col:nth-child(5){width:150px;}
.expiry-register-table col:nth-child(6){width:320px;}
.expiry-register-table col:nth-child(7){width:220px;}
.expiry-register-table col:nth-child(8){width:140px;}
.expiry-register-table col:nth-child(9){width:220px;}

/* -------------------- */
/* 태블릿 대응 */
/* -------------------- */

@media (max-width:1024px){

  html,body{
    height:auto;
    min-height:100%;
  }

  #page-content,
  .wms-page-content{
    height:auto;
    min-height:100vh;
  }

  .expiry-register-page{
    height:auto;
    min-height:100vh;
  }

  #print-area.table-shell{
    height:auto !important;
    min-height:520px;
    flex:0 0 auto;
  }

}

/* -------------------- */
/* 모바일 대응 */
/* -------------------- */

@media (max-width:640px){

  #expiry-register-toolbar{
    background:#fff;
    overflow:visible !important;
  }

  /* toolbar 전체 세로구조 */
  #expiry-register-toolbar .toolbar-row,
  #expiry-register-toolbar .toolbar-inner,
  #expiry-register-toolbar .toolbar-content{
    display:flex !important;
    flex-direction:column !important;
    gap:8px !important;
    width:100% !important;
  }

  /* 버튼 영역 */
  #expiry-register-toolbar .toolbar-left,
  #expiry-register-toolbar .toolbar-actions{
    display:flex !important;
    flex-wrap:wrap !important;
    gap:6px !important;
    width:100% !important;
    order:1;
  }

  /* 검색 영역 */
  #expiry-register-toolbar .toolbar-search,
  #expiry-register-toolbar .search-box,
  #expiry-register-toolbar .toolbar-search-box,
  #expiry-register-toolbar .search-wrap{
    width:100% !important;
    order:2;
  }

  #expiry-register-toolbar input[type="search"],
  #expiry-register-toolbar input[type="text"],
  #expiry-register-toolbar #toolbar-search-input{
    width:100% !important;
    max-width:100% !important;
  }

  /* 사용자 표시 */
  #expiry-register-toolbar .toolbar-user,
  #expiry-register-toolbar .current-user,
  #expiry-register-toolbar .toolbar-current-user,
  #expiry-register-toolbar .user-info,
  #expiry-register-toolbar [class*="user"]{
    width:100% !important;
    text-align:right !important;
    order:3;
    font-size:13px;
  }

  #expiry-register-toolbar button,
  #expiry-register-toolbar .icon-btn{
    flex:0 0 auto !important;
  }

  #print-area.table-shell{
    min-height:460px;
  }

}

/* -------------------- */
/* 모바일 모달 */
/* -------------------- */

@media (max-width:640px){

  .wms-modal,
  .modal,
  .wms-modal-box,
  .modal-box{
    width:calc(100vw - 24px) !important;
    max-width:calc(100vw - 24px) !important;
  }

  .wms-form-grid{
    grid-template-columns:1fr !important;
  }

  .wms-form-row,
  .wms-form-row.full{
    grid-column:1 / -1 !important;
  }

  .wms-form-input,
  .wms-form-textarea{
    width:100% !important;
  }

  .wms-form-textarea{
    min-height:260px;
  }

  .wms-modal-body,
  .modal-body{
    max-height:70vh;
    overflow:auto;
  }

}
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="expiry-register-page">
      <div id="page-topbar"></div>
      <div id="expiry-register-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table expiry-register-table" id="expiry-register-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="country">
            <col data-col-key="material_no">
            <col data-col-key="box_no">
            <col data-col-key="material_name">
            <col data-col-key="customer_name">
            <col data-col-key="user_name">
            <col data-col-key="note">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country">
                <div class="th-inner">
                  <span class="th-label">국가</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_no">
                <div class="th-inner">
                  <span class="th-label">코드</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="box_no">
                <div class="th-inner">
                  <span class="th-label">박스번호</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="material_name">
                <div class="th-inner">
                  <span class="th-label">자재내역</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="customer_name">
                <div class="th-inner">
                  <span class="th-label">납품처명</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="user_name">
                <div class="th-inner">
                  <span class="th-label">사용자</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="note">
                <div class="th-inner">
                  <span class="th-label">비고</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="expiry-register-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/issues/expiry_register.js?v=20260423_16"></script>
</body>
</html>
