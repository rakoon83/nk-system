<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCL 출고 이력</title>

  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=1">

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html,body{height:100%;margin:0;}
    body{overflow:auto;}

    #page-content,.wms-page-content{
      height:100%;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .lcl-history-page{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      background:#fff;
      overflow:hidden;
    }

    #page-topbar,#lcl-history-toolbar,#page-status{flex:0 0 auto;}

    .table-shell{overflow:auto !important;}

    #print-area.table-shell{
      flex:1 1 auto;
      min-height:0;
      min-width:0;
      height:0;
      overflow:auto !important;
    }

    #lcl-history-table{
      min-width:2400px;
      width:100%;
    }

    .lcl-history-table col:nth-child(1){width:44px;}
    .lcl-history-table col:nth-child(2){width:70px;}
    .lcl-history-table col:nth-child(3){width:90px;}
    .lcl-history-table col:nth-child(4){width:100px;}
    .lcl-history-table col:nth-child(5){width:100px;}
    .lcl-history-table col:nth-child(6){width:170px;}
    .lcl-history-table col:nth-child(7){width:100px;}
    .lcl-history-table col:nth-child(8){width:120px;}
    .lcl-history-table col:nth-child(9){width:90px;}
    .lcl-history-table col:nth-child(10){width:90px;}
    .lcl-history-table col:nth-child(11){width:90px;}
    .lcl-history-table col:nth-child(12){width:260px;}
    .lcl-history-table col:nth-child(13){width:100px;}
    .lcl-history-table col:nth-child(14){width:220px;}
    .lcl-history-table col:nth-child(15){width:140px;}
    .lcl-history-table col:nth-child(16){width:240px;}
    .lcl-history-table col:nth-child(17){width:140px;}
    .lcl-history-table col:nth-child(18){width:100px;}
    .lcl-history-table col:nth-child(19){width:140px;}
    .lcl-history-table col:nth-child(20){width:170px;}
    .lcl-history-table col:nth-child(21){width:170px;}

    .badge{
      display:inline-flex;
      align-items:center;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge-check{background:#fee2e2;color:#b91c1c;}
    .badge-ship{background:#dcfce7;color:#15803d;}
    .badge-part{background:#fef3c7;color:#92400e;}
    .badge-done{background:#dcfce7;color:#166534;}
    .qty-zero{color:#dc2626;font-weight:800;}

    @media (max-width:900px){
      html,body{height:auto;min-height:100%;}
      #page-content,.wms-page-content{height:auto;min-height:100vh;}
      .lcl-history-page{height:auto;min-height:100vh;}

      #print-area.table-shell{
        height:auto !important;
        min-height:520px;
        flex:0 0 auto;
      }
    }
  </style>
</head>

<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="lcl-history-page">
      <div id="page-topbar"></div>
      <div id="lcl-history-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table lcl-history-table" id="lcl-history-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="status_flag">
            <col data-col-key="shipping_mark">
            <col data-col-key="in_check_status">
            <col data-col-key="out_check_status">
            <col data-col-key="invoice">
            <col data-col-key="country">
            <col data-col-key="ship_date">
            <col data-col-key="pallet_kpp">
            <col data-col-key="pallet_aj">
            <col data-col-key="pallet_oneway">
            <col data-col-key="issue">
            <col data-col-key="total_qty">
            <col data-col-key="customer_name">
            <col data-col-key="manager">
            <col data-col-key="note">
            <col data-col-key="type">
            <col data-col-key="outbound_qty">
            <col data-col-key="user_name">
            <col data-col-key="created_at">
            <col data-col-key="archived_at">
          </colgroup>

          <thead>
            <tr>
              <th><div class="th-inner th-center"><input type="checkbox" class="chk" id="chk-all"></div></th>
              <th data-col-key="no"><div class="th-inner"><span class="th-label">NO</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="status_flag"><div class="th-inner"><span class="th-label">구분</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="shipping_mark"><div class="th-inner"><span class="th-label">쉬핑마크</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="in_check_status"><div class="th-inner"><span class="th-label">입고검수</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="out_check_status"><div class="th-inner"><span class="th-label">출고검수</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="invoice"><div class="th-inner"><span class="th-label">인보이스</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="country"><div class="th-inner"><span class="th-label">국가</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="ship_date"><div class="th-inner"><span class="th-label">출고일</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="pallet_kpp"><div class="th-inner"><span class="th-label">KPP</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="pallet_aj"><div class="th-inner"><span class="th-label">AJ</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="pallet_oneway"><div class="th-inner"><span class="th-label">일회용</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="issue"><div class="th-inner"><span class="th-label">상세특이사항</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="total_qty"><div class="th-inner"><span class="th-label">합계</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="customer_name"><div class="th-inner"><span class="th-label">납품처명</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="manager"><div class="th-inner"><span class="th-label">담당자</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="note"><div class="th-inner"><span class="th-label">비고</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="type"><div class="th-inner"><span class="th-label">유형</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="outbound_qty"><div class="th-inner"><span class="th-label">수량</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="user_name"><div class="th-inner"><span class="th-label">사용자</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="created_at"><div class="th-inner"><span class="th-label">등록일</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
              <th data-col-key="archived_at"><div class="th-inner"><span class="th-label">아카이브일</span><span class="sort-mark">↕</span><span class="resize-handle"></span></div></th>
            </tr>
          </thead>

          <tbody id="lcl-history-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/lcl/lcl_out_history.js?v=20260425_01"></script>
</body>
</html>
