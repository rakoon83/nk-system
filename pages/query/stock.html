<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 조회</title>

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260421">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/toolbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    html, body{
      height:100%;
    }

    body{
      overflow:hidden;
    }

    .wms-page-content{
      height:100%;
      overflow:hidden;
    }

    .stock-page{
      height:100%;
      display:flex;
      flex-direction:column;
      background:#fff;
    }

    .stock-table{
      min-width:1240px;
    }

    .stock-table col:nth-child(1){ width:44px; }
    .stock-table col:nth-child(2){ width:80px; }
    .stock-table col:nth-child(3){ width:120px; }
    .stock-table col:nth-child(4){ width:140px; }
    .stock-table col:nth-child(5){ width:180px; }
    .stock-table col:nth-child(6){ width:220px; }
    .stock-table col:nth-child(7){ width:180px; }
    .stock-table col:nth-child(8){ width:100px; }
    .stock-table col:nth-child(9){ width:130px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="stock-page">
      <div id="page-topbar"></div>
      <div id="stock-toolbar"></div>

      <div id="print-area" class="table-shell">
        <table class="wms-table stock-table" id="stock-table">
          <colgroup>
            <col>
            <col data-col-key="no">
            <col data-col-key="country">
            <col data-col-key="code">
            <col data-col-key="box">
            <col data-col-key="name">
            <col data-col-key="note">
            <col data-col-key="qty">
            <col data-col-key="writer">
          </colgroup>

          <thead>
            <tr>
              <th>
                <div class="th-inner th-center">
                  <input type="checkbox" class="chk" id="chk-all">
                </div>
              </th>

              <th data-col-key="no">
                <div class="th-inner">
                  <span class="th-label">NO</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="country">
                <div class="th-inner">
                  <span class="th-label">국가</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="code">
                <div class="th-inner">
                  <span class="th-label">코드</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="box">
                <div class="th-inner">
                  <span class="th-label">박스번호</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="name">
                <div class="th-inner">
                  <span class="th-label">자재내역</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="note">
                <div class="th-inner">
                  <span class="th-label">비고</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="qty">
                <div class="th-inner">
                  <span class="th-label">재고</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>

              <th data-col-key="writer">
                <div class="th-inner">
                  <span class="th-label">등록자</span>
                  <span class="sort-mark">↕</span>
                  <span class="resize-handle"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="stock-tbody"></tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/query/stock.js?v=20260421"></script>
</body>
</html>
