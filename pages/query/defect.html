<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결품 조회</title>

  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=1">

  <link rel="stylesheet" href="/assets/css/font.css">
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/nav.css?v=20260422">
  <link rel="stylesheet" href="/assets/css/topbar.css">
  <link rel="stylesheet" href="/assets/css/table.css">
  <link rel="stylesheet" href="/assets/css/modal.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html,body{height:100%;margin:0;}
    body{overflow:auto;}

    #page-content,.wms-page-content{
      height:100%;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .defect-page{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      background:#fff;
      overflow:hidden;
    }

    #page-topbar,#page-status{flex:0 0 auto;}

    .defect-panel{
      flex:0 0 auto;
      padding:10px 12px;
      border-bottom:1px solid #e5e7eb;
      background:#fff;
    }

    .defect-row{
      display:flex;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
    }

    .defect-row label{
      width:70px;
      font-size:13px;
      font-weight:800;
    }

    .defect-input{
      width:260px;
      height:38px;
      border:1px solid #cbd5e1;
      padding:0 10px;
      font-size:15px;
      min-width:0;
    }

    .defect-btn{
      height:38px;
      padding:0 14px;
      border:1px solid #cbd5e1;
      background:#f8fafc;
      font-weight:800;
      cursor:pointer;
    }

    .defect-btn.primary{
      background:#2563eb;
      border-color:#2563eb;
      color:#fff;
    }

    .note-card{
      margin-top:8px;
      border:1px solid #e5e7eb;
      background:#fff;
    }

    .note-card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 10px;
      border-bottom:1px solid #e5e7eb;
      background:#f8fafc;
      font-size:13px;
      font-weight:900;
    }

    .note-card-body{
      padding:10px;
      font-size:13px;
      line-height:1.6;
      max-height:72px;
      overflow:hidden;
      white-space:pre-wrap;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      border:1px solid #e5e7eb;
      margin-top:8px;
    }

    .summary-item{
      display:flex;
      border-right:1px solid #e5e7eb;
      border-bottom:1px solid #e5e7eb;
      min-height:34px;
    }

    .summary-item span{
      width:90px;
      background:#f8fafc;
      padding:8px;
      font-size:13px;
      font-weight:800;
    }

    .summary-item strong{
      flex:1;
      padding:8px;
      font-size:13px;
      font-weight:700;
    }

    .defect-check-box{
  margin-top:8px;
  border:1px solid #e5e7eb;
}

.defect-check-head{
  padding:8px 10px;
  background:#f8fafc;
  border-bottom:1px solid #e5e7eb;
  font-size:13px;
  font-weight:900;
}


.defect-check-copy{
  width:100%;
  min-height:38px;
  padding:9px 10px;
  border:0;
  background:#ffffff;
  color:#111827;
  text-align:left;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
}


.defect-check-copy:hover{
  background:#f8fafc;
}
    .table-title{
      padding:8px 12px;
      border-bottom:1px solid #e5e7eb;
      font-size:13px;
      font-weight:900;
      background:#fff;
    }

    .table-shell{overflow:auto !important;}

    #print-area.table-shell{
      flex:1 1 auto;
      min-height:0;
      min-width:0;
      height:0;
      overflow:auto !important;
    }

    #defect-table{
      min-width:1250px;
      width:100%;
    }

    .defect-table col:nth-child(1){width:60px;}
    .defect-table col:nth-child(2){width:100px;}
    .defect-table col:nth-child(3){width:100px;}
    .defect-table col:nth-child(4){width:320px;}
    .defect-table col:nth-child(5){width:70px;}
    .defect-table col:nth-child(6){width:80px;}
    .defect-table col:nth-child(7){width:80px;}
    .defect-table col:nth-child(8){width:80px;}
    .defect-table col:nth-child(9){width:260px;}

    .defect-table th{
      cursor:pointer;
      user-select:none;
    }

    .sort-mark{
      margin-left:4px;
      color:#94a3b8;
      font-size:12px;
    }

    .defect-badge{
      display:inline-flex;
      height:24px;
      padding:0 10px;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .defect-badge.work-o{background:#dcfce7;color:#15803d;}
    .defect-badge.work-x{background:#e2e8f0;color:#475569;}
    .defect-badge.bad{background:#fee2e2;color:#b91c1c;}
    .defect-badge.ok{background:#dbeafe;color:#1d4ed8;}

    .row-partial td{background:#fff7ed !important;}
    .row-defect td{background:#fee2e2 !important;}

    @media (max-width:900px){
      html,body{height:auto;min-height:100%;}
      #page-content,.wms-page-content{height:auto;min-height:100vh;}
      .defect-page{height:auto;min-height:100vh;}
      #print-area.table-shell{height:auto;min-height:420px;}
      .defect-row{flex-wrap:wrap;}
      .defect-row label{width:100%;}
      .defect-input{width:100%;flex:1 1 100%;}
      .summary-grid{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div id="app-nav"></div>

  <div id="page-content">
    <div class="defect-page">
      <div id="page-topbar"></div>

      <div class="defect-panel">
        <div class="defect-row">
          <label for="invoiceInput">Invoice</label>
          <input id="invoiceInput" class="defect-input" type="text" autocomplete="off">
          <button id="btnSearchInvoice" class="defect-btn primary" type="button">조회</button>
          <button id="btnSpecialDetail" class="defect-btn" type="button">특이사항 상세보기</button>
        </div>

        <div class="note-card">
          <div class="note-card-head">
            <span>특이사항</span>
            <span id="noteCount">0건</span>
          </div>
          <div id="specialNoteCard" class="note-card-body">Invoice 조회 후 표시됩니다.</div>
        </div>

        <div class="summary-grid">
          <div class="summary-item"><span>국가</span><strong id="country">-</strong></div>
          <div class="summary-item"><span>출고일</span><strong id="ship_date">-</strong></div>
          <div class="summary-item"><span>상차위치</span><strong id="location">-</strong></div>
          <div class="summary-item"><span>컨테이너</span><strong id="container">-</strong></div>
          <div class="summary-item"><span>CBM</span><strong id="cbm">0</strong></div>
          <div class="summary-item"><span>수량</span><strong id="outbound_qty">0</strong></div>
          <div class="summary-item"><span>행수</span><strong id="row_count">0</strong></div>
          <div class="summary-item"><span>결품</span><strong id="defect_count">0</strong></div>
        </div>

        <div class="defect-check-box">
          <div class="defect-check-head">결품 확인란</div>
          <button id="defectCheck" class="defect-check-copy" type="button">
            Invoice 조회 후 표시됩니다.
          </button>
        </div>
      </div>

      <div class="table-title">자재내역</div>

      <div id="print-area" class="table-shell">
        <table class="wms-table defect-table" id="defect-table">
          <colgroup>
            <col><col><col><col><col><col><col><col><col>
          </colgroup>

          <thead>
            <tr>
              <th data-sort-key="list_no">번호 <span class="sort-mark">↕</span></th>
              <th data-sort-key="material_no">코드 <span class="sort-mark">↕</span></th>
              <th data-sort-key="box_no">박스번호 <span class="sort-mark">↕</span></th>
              <th data-sort-key="material_name">자재내역 <span class="sort-mark">↕</span></th>
              <th data-sort-key="work">작업 <span class="sort-mark">↕</span></th>
              <th data-sort-key="outbound_qty">출고 <span class="sort-mark">↕</span></th>
              <th data-sort-key="inbound_qty">입고 <span class="sort-mark">↕</span></th>
              <th data-sort-key="comparison">비교 <span class="sort-mark">↕</span></th>
              <th data-sort-key="note">비고 <span class="sort-mark">↕</span></th>
            </tr>
          </thead>

          <tbody id="defect-tbody">
            <tr>
              <td colspan="9" class="table-empty">Invoice 조회 후 표시됩니다.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="page-status" class="status-text no-print"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/assets/js/pages/query/defect.js?v=20260426_06"></script>
</body>
</html>
