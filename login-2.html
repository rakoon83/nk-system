<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS 로그인</title>

  <link rel="stylesheet" href="/assets/css/wms-ui.css" />

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: "Malgun Gothic","Apple SD Gothic Neo",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        linear-gradient(135deg, #eef4ff 0%, #f8fbff 45%, #f3f6fb 100%);
      color:#1f2937;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-page{
      width:100%;
      max-width:980px;
      min-height:600px;
      background:#ffffff;
      border:1px solid #dbe4f0;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(15, 23, 42, 0.10);
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
    }

    .login-brand{
      position:relative;
      padding:48px 42px;
      background:
        linear-gradient(160deg, #f8fbff 0%, #edf4ff 55%, #e7f0ff 100%);
      border-right:1px solid #dde6f2;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .brand-top{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand-mark{
      width:56px;
      height:56px;
      border-radius:16px;
      background:linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:800;
      box-shadow:0 10px 25px rgba(37, 99, 235, 0.22);
    }

    .brand-name{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand-name strong{
      font-size:24px;
      line-height:1.2;
      color:#0f172a;
    }

    .brand-name span{
      font-size:13px;
      color:#64748b;
    }

    .brand-center{
      margin-top:32px;
    }

    .brand-title{
      font-size:38px;
      line-height:1.2;
      font-weight:800;
      color:#0f172a;
      letter-spacing:-0.02em;
      margin:0 0 14px;
    }

    .brand-desc{
      margin:0;
      font-size:15px;
      line-height:1.7;
      color:#475569;
      max-width:420px;
    }

    .brand-points{
      margin-top:28px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .brand-point{
      display:flex;
      align-items:center;
      gap:10px;
      padding:13px 14px;
      background:rgba(255,255,255,0.72);
      border:1px solid #dbe7f5;
      border-radius:14px;
      color:#334155;
      font-size:14px;
    }

    .brand-point .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#2563eb;
      flex:0 0 auto;
    }

    .brand-bottom{
      margin-top:28px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:#1d4ed8;
      background:#eff6ff;
      border:1px solid #cfe0ff;
    }

    .login-panel{
      padding:48px 42px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#ffffff;
    }

    .login-box{
      width:100%;
      max-width:360px;
    }

    .login-label-top{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      font-size:12px;
      font-weight:700;
      color:#475569;
      margin-bottom:16px;
    }

    .login-title{
      margin:0 0 8px;
      font-size:30px;
      font-weight:800;
      color:#0f172a;
      letter-spacing:-0.02em;
    }

    .login-subtitle{
      margin:0 0 28px;
      font-size:14px;
      line-height:1.6;
      color:#64748b;
    }

    .form-group{
      margin-bottom:16px;
    }

    .form-label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      font-weight:700;
      color:#334155;
    }

    .form-input{
      width:100%;
      height:48px;
      padding:0 14px;
      border:1px solid #cfd8e3;
      border-radius:12px;
      background:#ffffff;
      font-size:14px;
      color:#111827;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .form-input::placeholder{
      color:#94a3b8;
    }

    .form-input:focus{
      outline:none;
      border-color:#3b82f6;
      box-shadow:0 0 0 4px rgba(59,130,246,0.12);
      background:#fff;
    }

    .login-btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color:#ffffff;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(37,99,235,0.22);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      margin-top:8px;
    }

    .login-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 16px 28px rgba(37,99,235,0.24);
    }

    .login-btn:active{
      transform:translateY(0);
    }

    .login-btn[disabled]{
      opacity:.7;
      cursor:default;
    }

    .error-msg{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#be123c;
      font-size:13px;
      line-height:1.5;
    }

    .login-info{
      margin-top:18px;
      font-size:12px;
      line-height:1.6;
      color:#94a3b8;
      text-align:center;
    }

    @media (max-width: 900px){
      .login-page{
        grid-template-columns:1fr;
        max-width:520px;
      }

      .login-brand{
        border-right:none;
        border-bottom:1px solid #dde6f2;
        padding:32px 24px 26px;
      }

      .brand-title{
        font-size:28px;
      }

      .login-panel{
        padding:32px 24px;
      }
    }

    @media (max-width: 520px){
      body{
        padding:14px;
      }

      .login-page{
        min-height:auto;
        border-radius:18px;
      }

      .login-brand,
      .login-panel{
        padding:24px 18px;
      }

      .brand-title{
        font-size:24px;
      }

      .login-title{
        font-size:26px;
      }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <section class="login-brand">
      <div>
        <div class="brand-top">
          <div class="brand-mark">W</div>
          <div class="brand-name">
            <strong>WMS SYSTEM</strong>
            <span>Warehouse Management System</span>
          </div>
        </div>

        <div class="brand-center">
          <h1 class="brand-title">창고 운영을 더 빠르고<br>깔끔하게 관리</h1>
          <p class="brand-desc">
            검수, 스캔, 재고조회, 이슈관리, 보수작업까지
            한 화면 흐름으로 연결되는 WMS 로그인 화면입니다.
          </p>

          <div class="brand-points">
            <div class="brand-point">
              <span class="dot"></span>
              <span>PC / 모바일 공용 화면</span>
            </div>
            <div class="brand-point">
              <span class="dot"></span>
              <span>페이지별 공통 네비게이션 연동</span>
            </div>
            <div class="brand-point">
              <span class="dot"></span>
              <span>권한 기반 메뉴 확장 가능</span>
            </div>
          </div>
        </div>
      </div>

      <div class="brand-bottom">
        <span class="chip">SCAN</span>
        <span class="chip">QUERY</span>
        <span class="chip">ISSUES</span>
        <span class="chip">REPAIR</span>
        <span class="chip">ADMIN</span>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-box">
        <div class="login-label-top">로그인</div>
        <h2 class="login-title">접속하기</h2>
        <p class="login-subtitle">
          등록된 아이디와 비밀번호를 입력한 뒤
          메인 화면으로 이동합니다.
        </p>

        <div class="form-group">
          <label class="form-label" for="login-id">아이디</label>
          <input id="login-id" class="form-input" type="text" placeholder="아이디 입력" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-pw">비밀번호</label>
          <input id="login-pw" class="form-input" type="password" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>

        <button id="login-btn" class="login-btn" type="button">로그인</button>

        <div id="login-error" class="error-msg">
          아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <div class="login-info">
          로그인 성공 시 <strong>main.html</strong> 로 이동합니다.
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { login } from "/assets/js/core/auth.js";

    const idInput = document.getElementById("login-id");
    const pwInput = document.getElementById("login-pw");
    const loginBtn = document.getElementById("login-btn");
    const errorBox = document.getElementById("login-error");

    loginBtn.addEventListener("click", doLogin);

    pwInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    idInput.addEventListener("input", hideError);
    pwInput.addEventListener("input", hideError);

    async function doLogin(){
      const id = idInput.value.trim();
      const pw = pwInput.value.trim();

      hideError();

      if(!id || !pw){
        showError("아이디와 비밀번호를 입력해 주세요.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "로그인 확인중...";

      try{
        const ok = await login(id, pw);

        if(ok){
          location.href = "/main.html";
          return;
        }

        showError("아이디 또는 비밀번호가 올바르지 않습니다.");
      }catch(err){
        console.error(err);
        showError("로그인 처리 중 오류가 발생했습니다.");
      }finally{
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    function showError(message){
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function hideError(){
      errorBox.style.display = "none";
    }
  </script>
</body>
</html>
